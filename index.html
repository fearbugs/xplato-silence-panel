<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>xPlato Silence Control</title>
  <link rel="icon" href="assets/xplato-mark.png">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/config.js"></script>
  <script src="assets/app.js?v=admin-page-1" defer></script>
</head>
<body>
  <header class="app-header">
    <button class="brand" id="brandTrigger" type="button" aria-label="Silence Control">
      <img src="assets/xplato-mark.png" alt="">
      <span>
        <strong>xPlato</strong>
        <small>Silence Control</small>
      </span>
    </button>
    <div class="service-state" id="serviceState">
      <span class="state-dot"></span>
      <span>Checking service</span>
    </div>
  </header>

  <main class="workspace" id="workspace">
    <section class="composer" aria-labelledby="batchHeading">
      <div class="section-title">
        <div>
          <span class="eyebrow">New batch</span>
          <h1 id="batchHeading">Schedule silences</h1>
        </div>
        <button class="icon-button" id="clearBatch" type="button" title="Clear batch" aria-label="Clear batch">×</button>
      </div>

      <form id="batchForm">
        <label class="field">
          <span>UIDs</span>
          <textarea id="uidInput" rows="5" spellcheck="false" placeholder="3mf7t8ey7ithz-1a6m22j8be4ig"></textarea>
        </label>

        <div class="field">
          <span>Default duration</span>
          <div class="duration-presets" id="durationPresets">
            <button type="button" data-hours="4" class="selected">4h</button>
            <button type="button" data-hours="8">8h</button>
            <button type="button" data-hours="12">12h</button>
            <button type="button" data-hours="24">24h</button>
          </div>
        </div>

        <div class="inline-fields">
          <label class="field compact">
            <span>Hours</span>
            <input id="defaultHours" type="number" min="4" max="720" step="0.25" value="4">
          </label>
          <label class="field compact">
            <span>Start</span>
            <select id="startMode">
              <option value="now">Immediately</option>
              <option value="scheduled">Scheduled</option>
            </select>
          </label>
        </div>

        <label class="field hidden" id="startAtField">
          <span>Start time</span>
          <input id="startAt" type="datetime-local">
        </label>

        <button class="secondary-button" id="addTargets" type="button">
          <span aria-hidden="true">+</span>
          Add UIDs
        </button>

        <label class="field otp-field">
          <span>One-time password</span>
          <input id="otp" type="text" maxlength="14" autocomplete="one-time-code" spellcheck="false" placeholder="B7KM9D4QXP">
        </label>

        <label class="field">
          <span>Your Plato ID</span>
          <input id="note" type="text" maxlength="100" autocomplete="username" spellcheck="false" placeholder="28zjyxivp1u9g-2myvom7neio1q" required>
        </label>

        <button class="primary-button" id="submitBatch" type="submit">Schedule batch</button>
      </form>
    </section>

    <section class="review" aria-labelledby="reviewHeading">
      <div class="section-title review-title">
        <div>
          <span class="eyebrow">Review</span>
          <h2 id="reviewHeading">Targets</h2>
        </div>
        <span class="count" id="targetCount">0</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>UID</th>
              <th class="duration-column">Duration</th>
              <th class="action-column"><span class="sr-only">Remove</span></th>
            </tr>
          </thead>
          <tbody id="targetRows">
            <tr class="empty-row"><td colspan="3">No UIDs added.</td></tr>
          </tbody>
        </table>
      </div>

      <div class="activity" id="activity" role="status" aria-live="polite">
        <strong>Ready</strong>
        <span>Add UIDs to prepare a batch.</span>
      </div>
    </section>
  </main>

  <section class="receipt-band hidden" id="receiptBand" aria-labelledby="receiptHeading">
    <div class="receipt-inner">
      <div class="section-title">
        <div>
          <span class="eyebrow">Batch receipt</span>
          <h2 id="receiptHeading">Current status</h2>
        </div>
        <button class="secondary-button small" id="refreshReceipt" type="button">Refresh</button>
      </div>
      <div class="receipt-summary" id="receiptSummary"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>UID</th><th>Duration</th><th>Status</th><th>Next event</th></tr></thead>
          <tbody id="receiptRows"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section id="adminPage" class="admin-page hidden" aria-labelledby="adminHeading">
    <div class="dialog-head">
      <div>
        <span class="eyebrow">Restricted</span>
        <h2 id="adminHeading">Administration</h2>
      </div>
      <button class="icon-button" id="closeAdmin" type="button" aria-label="Back to panel">×</button>
    </div>

    <form id="adminLogin" class="admin-login">
      <label class="field">
        <span>Master password</span>
        <input id="masterPassword" type="password" autocomplete="current-password" required>
      </label>
      <button class="primary-button" type="submit">Open dashboard</button>
      <div class="form-error" id="adminLoginError" role="alert"></div>
    </form>

    <div id="adminDashboard" class="admin-dashboard hidden">
      <div class="metrics" id="adminMetrics"></div>
      <div class="admin-toolbar">
        <select id="adminStatusFilter" aria-label="Silence status">
          <option value="">All statuses</option>
          <option value="scheduled">Scheduled</option>
          <option value="queued">Queued</option>
          <option value="active">Active</option>
          <option value="holding">Holding</option>
          <option value="failed">Failed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="secondary-button small" id="refreshAdmin" type="button">Refresh</button>
        <button class="ghost-button small" id="adminLogout" type="button">Log out</button>
      </div>
      <div class="table-wrap admin-table-wrap">
        <table>
          <thead><tr><th>Moderator</th><th>UID</th><th>Status</th><th>Expiry</th><th>Next refresh</th><th>Actions</th></tr></thead>
          <tbody id="adminRows"></tbody>
        </table>
      </div>
      <div class="activity compact-activity" id="runnerState"></div>
    </div>
  </section>

  <dialog id="extendDialog" class="small-dialog">
    <form id="extendForm">
      <div class="dialog-head">
        <h2>Extend silence</h2>
        <button class="icon-button" id="closeExtend" type="button" aria-label="Close">×</button>
      </div>
      <label class="field">
        <span>Total hours from initial acknowledgement</span>
        <input id="extendHours" type="number" min="4" max="720" step="0.25" value="8" required>
      </label>
      <input id="extendSilenceId" type="hidden">
      <button class="primary-button" type="submit">Update duration</button>
    </form>
  </dialog>
</body>
</html>
